<!doctype html>
<html>
<head>
  <meta http-equiv="content-type" content="txt/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <title>File Hosting (R2)</title>
  <link rel="stylesheet" href="https://crazypeace.github.io/file-r2-worker/styles.css">
</head>
<body>
  <div class="d-flex align-items-start flex-wrap">

  <!-- 1. 文件选择 + 上传 -->
  <div class="card shadow m-3">
    <h5 class="card-header">选择文件并上传到 R2</h5>
    <div class="card-body">
      <div class="mb-3">
        <label for="input_file" class="form-label">选择文件</label>
        <input class="form-control" type="file" id="input_file">
      </div>

      <div class="mb-3">
        <button class="btn btn-warning" type="button" onclick='uploadToR2()' id="uploadBtn" disabled>上传到 R2</button>
      </div>

      <!-- R2 S3 配置 (由 Worker 注入真实值, 隐藏) -->
      <input type="hidden" id="r2AccountId"       value="__R2_ACCOUNT_ID__">
      <input type="hidden" id="r2AccessKeyId"      value="__R2_ACCESS_KEY_ID__">
      <input type="hidden" id="r2SecretAccessKey"  value="__R2_SECRET_ACCESS_KEY__">
      <input type="hidden" id="r2BucketName"       value="__R2_BUCKET_NAME__">
      <input type="hidden" id="r2PublicUrl"        value="__R2_PUBLIC_URL__">

      <!-- 隐藏字段, 仅供 JS 读取 -->
      <input type="hidden" id="longURL" value="">
      <input type="hidden" id="keyPhrase" value="">
      <input type="hidden" id="passwordText" value="__PASSWORD__">

      <!-- 上传进度条 -->
      <div class="mb-3" id="progressWrap" style="display:none;">
        <div class="progress">
          <div class="progress-bar progress-bar-striped progress-bar-animated" id="progressBar" style="width: 0%">0%</div>
        </div>
        <small class="text-muted mt-1" id="progressText"></small>
      </div>
    </div>
    <div class="card-footer">
      <span> <a href="https://github.com/crazypeace/file-r2-worker/" target="_self">Fork me on GitHub</a> </span>
    </div>
  </div>

  <!-- 4. S3/ShareX 配置指南 (折叠面板, 放在底部) -->
  <div class="card shadow m-3" style="max-width:768px;">
    <h5 class="card-header d-flex justify-content-between align-items-center" 
        data-bs-toggle="collapse" data-bs-target="#s3Guide" role="button" 
        aria-expanded="false" aria-controls="#s3Guide" style="cursor:pointer;">
      📤 ShareX S3 上传器配置指南
      <span class="badge bg-secondary">展开查看</span>
    </h5>
    <div class="collapse" id="s3Guide">
      <div class="card-body" style="font-size:0.92rem;">
        <p class="text-muted mb-3">在 ShareX 中选择 <b>File uploaders → Amazon S3</b>，按如下参数填写：</p>

        <!-- Access key ID -->
        <div class="mb-3">
          <label class="form-label fw-bold">Access key ID:</label>
          <input type="text" class="form-control" readonly id="g-r2AccessKeyId" value="__R2_ACCESS_KEY_ID__">
        </div>

        <!-- Secret access key -->
        <div class="mb-3">
          <label class="form-label fw-bold">Secret access key:</label>
          <input type="text" class="form-control" readonly id="g-r2SecretAccessKey" value="__R2_SECRET_ACCESS_KEY__">
        </div>

        <!-- Endpoints -->
        <div class="mb-3">
          <label class="form-label fw-bold">Endpoints:</label>
          <input type="text" class="form-control" readonly value="" placeholder="（留空）">
        </div>

        <!-- Endpoint + Region 并排 -->
        <div class="row mb-3">
          <div class="col-md-9">
            <label class="form-label fw-bold">Endpoint:</label>
            <input type="text" class="form-control" readonly id="g-r2Endpoint" value="https://__R2_ACCOUNT_ID__.r2.cloudflarestorage.com">
          </div>
          <div class="col-md-3">
            <label class="form-label fw-bold">Region:</label>
            <input type="text" class="form-control" readonly value="auto">
          </div>
        </div>

        <!-- Bucket name -->
        <div class="mb-3">
          <label class="form-label fw-bold">Bucket name:</label>
          <input type="text" class="form-control" readonly id="g-r2BucketName" value="__R2_BUCKET_NAME__">
        </div>

        <!-- Upload path -->
        <div class="mb-3">
          <label class="form-label fw-bold">Upload path:</label>
          <input type="text" class="form-control" readonly value="" placeholder="（留空 = 根目录）">
        </div>

        <!-- Use custom domain -->
        <div class="mb-3">
          <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" checked disabled id="checkCustomDomain">
            <label class="form-check-label fw-bold" for="checkCustomDomain">Use custom domain:</label>
          </div>
          <input type="text" class="form-control" readonly id="g-r2PublicUrl" value="__R2_PUBLIC_URL__">
        </div>

        <!-- Advanced -->
        <div class="border rounded p-3 mb-3">
          <div class="fw-bold mb-2">Advanced</div>

          <!-- Storage class -->
          <div class="row mb-3 align-items-center">
            <div class="col-auto">
              <label class="form-label fw-bold mb-0">Storage class:</label>
            </div>
            <div class="col">
              <input type="text" class="form-control" readonly value="Amazon S3 Standard">
            </div>
          </div>

          <!-- Checkboxes -->
          <div class="mb-2">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" disabled id="checkSigned">
              <label class="form-check-label" for="checkSigned">Signed payload</label>
            </div>
          </div>
          <div class="mb-2">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" disabled id="checkACL">
              <label class="form-check-label" for="checkACL">Set public-read ACL on file</label>
            </div>
          </div>
          <div class="mb-2">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" disabled id="checkPathStyle">
              <label class="form-check-label" for="checkPathStyle">Use path style request</label>
            </div>
          </div>

          <!-- Remove file extension on -->
          <div class="row mb-0 align-items-center">
            <div class="col-auto">
              <label class="form-label fw-bold mb-0">Remove file extension on:</label>
            </div>
            <div class="col-auto d-flex gap-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" disabled id="checkExtImg">
                <label class="form-check-label" for="checkExtImg">Image</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" disabled id="checkExtVid">
                <label class="form-check-label" for="checkExtVid">Video</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" disabled id="checkExtTxt">
                <label class="form-check-label" for="checkExtTxt">Text</label>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- 3. LocalStorage List -->
  <div class="card shadow m-3">
    <h5 class="card-header">LocalStorage List</h5>
    <div class="card-body">
      <div class="input-group mb-3">
        <button class="btn btn-warning" type="button" onclick='loadR2ToKV()' id="loadR2Btn">load R2 to KV</button>
        <button class="btn btn-info" type="button" onclick='loadKV()' id="loadKV2localStgBtn">load KV to localStorage</button>
        <button class="btn btn-success" type="button" onclick='loadUrlList()' id="loadListBtn">load localStorage</button>
        <button class="btn btn-danger" type="button" onclick='clearLocalStorage()' id="clearlocalStgBtn">clear localStorage</button>
      </div>

      <div class="card-text">
        <div classs="list-group" id="urlList">
          <div class="mb-3 list-group-item">
            <div class="input-group">
              <button type="button" class="btn btn-danger" onclick='deleteShortUrl("4sure")' id="delBtn-4sure">X</button>
              <button type="button" class="btn btn-info" onclick='queryVisitCount("4sure")' id="qryCntBtn-4sure">?</button>
              <span class="form-control">https://1way.eu.org/4sure</span>
            </div>
            <div class="form-control">
              https://en.y2mate.is/s36/youtube-to-mp3.html
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>


  </div>

  <!-- Result Modal -->
  <div class="modal fade" id="resultModal" tabindex="-1" role="dialog" aria-labelledby="resultModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="resultModalLabel">Result</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="result">No result</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" onclick='copyurl("result")' data-bs-toggle="popover" data-bs-placement="bottom" data-bs-content="Copied!">Copy</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/gh/lrsjng/jquery-qrcode@0.18.0/dist/jquery-qrcode.min.js" crossorigin="anonymous"></script>

  <script src="https://crazypeace.github.io/file-r2-worker/main.js" crossorigin="anonymous"></script>

  <script>
    // 覆盖 buildValueItemFunc: 缩略图 512px, 不判断文件类型, 失败就失败
    // 用户需在 R2 自定义域名上开启 Image Transformations
    // 函数的定义在 main.js 中
    (function() {
      var IMG_MAX = 512;

      function thumbUrl(r2Url) {
        try {
          var u = new URL(r2Url);
          return u.origin + "/cdn-cgi/image/width=" + IMG_MAX + ",quality=75,format=auto" + u.pathname;
        } catch(e) {
          return r2Url;
        }
      }

      buildValueItemFunc = function(longUrl) {
        var wrap = document.createElement('div');
        wrap.classList.add("form-control", "rounded-top-0");

        var img = document.createElement('img');
        img.src = thumbUrl(longUrl);
        img.style.cssText = "max-width:" + IMG_MAX + "px;max-height:" + IMG_MAX + "px;border-radius:6px;cursor:pointer;display:block;";
        img.title = '点击查看原图';
        img.onerror = function() { img.remove(); };
        img.onclick = function() { window.open(longUrl, '_blank'); };
        wrap.appendChild(img);

        var txt = document.createElement('small');
        txt.style.cssText = 'word-break:break-all;display:block;margin-top:4px;opacity:0.7;';
        txt.innerText = longUrl;
        wrap.appendChild(txt);

        return wrap;
      };
    })();

    // S3 配置指南: 用隐藏字段的真实值替换占位符
    (function() {
      var map = {
        '__R2_ACCOUNT_ID__':      'r2AccountId',
        '__R2_ACCESS_KEY_ID__':   'r2AccessKeyId',
        '__R2_SECRET_ACCESS_KEY__':'r2SecretAccessKey',
        '__R2_BUCKET_NAME__':     'r2BucketName',
        '__R2_PUBLIC_URL__':      'r2PublicUrl',
      };
      Object.keys(map).forEach(function(placeholder) {
        var el = document.getElementById(map[placeholder]);
        var val = el ? el.value : '';
        if (!val) return;
        // 替换指南区域中的占位符
        var guideEl = document.getElementById('s3Guide');
        if (guideEl) {
          guideEl.innerHTML = guideEl.innerHTML.split(placeholder).join(val);
        }
      });
      // 特殊处理 Endpoint (拼接 accountId)
      var accId = document.getElementById('r2AccountId').value;
      if (accId) {
        var endpointEl = document.getElementById('g-r2Endpoint');
        if (endpointEl) endpointEl.innerText = 'https://' + accId + '.r2.cloudflarestorage.com';
      }
    })();
  </script>
</body>
</html>
